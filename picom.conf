backend = "glx";
vsync = true;
use-damage = false;

#################################
# SOMBRAS
#################################
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.25;

#################################
# BLUR (FORMA COMPATIBLE v10)
#################################

blur:
{
  method = "dual_kawase";
  strength = 8;
}

blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

#################################
# TRANSPARENCIA KITTY
#################################
opacity-rule = [
  "85:class_g = 'kitty'"
];

#################################
# EXCLUSIONES
#################################
blur-background-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'"
];

corner-radius = 20;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
