[colors]
green = #b57cff
white = #FFFFFF
bg = #cc000000

; =========================
; BARRA PRINCIPAL
; =========================
[bar/main]
width = 100%
height = 36

offset-x = 0%
offset-y = 0

radius = 0

background = ${colors.bg}
foreground = ${colors.green}

border-size = 2
border-color = #4b0082

padding-left = 2
padding-right = 2
module-margin = 2

modules-left = workspaces
modules-center =
modules-right = ip volume battery date

font-0 = "DejaVu Sans:size=11"

enable-ipc = true
override-redirect = false

; =========================
; WORKSPACES
; =========================
[module/workspaces]
type = internal/i3
index-sort = true

; ESPACIADO
label-focused-padding = 2
label-unfocused-padding = 2
label-visible-padding = 2
label-urgent-padding = 2

; TEXTO
label-focused = %name%
label-unfocused = %name%
label-visible = %name%
label-urgent = %name%

; COLORES
label-focused-foreground = ${colors.green}
label-unfocused-foreground = ${colors.white}
label-visible-foreground = ${colors.white}
label-urgent-foreground = ${colors.green}

; FONDO ACTIVO (SUAVE)
label-focused-background = #2200FF00

; SEPARACIÓN
label-separator = " "
label-separator-foreground = ${colors.white}

; =========================
; IP
; =========================
[module/ip]
type = custom/script
exec = hostname -I | awk '{print $1}'
interval = 5

label = IP %output%
label-foreground = ${colors.green}

; =========================
; VOLUMEN
; =========================
[module/volume]
type = internal/pulseaudio

label-volume = VOL %percentage%%
label-muted = MUTED

format-volume = <label-volume>
format-muted = <label-muted>

label-volume-foreground = ${colors.green}

; =========================
; BATERÍA
; =========================
[module/battery]
type = internal/battery
battery = BAT0
adapter = AC

full-at = 98

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = 100%

format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>

label-charging-foreground = ${colors.green}
label-discharging-foreground = ${colors.green}

; =========================
; FECHA / HORA
; =========================
[module/date]
type = internal/date
interval = 5

date = %d/%m
time = %H:%M

label = %date% %time%
label-foreground = ${colors.green}
